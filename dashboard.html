<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Dashboard</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0f1117;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
    }

    h1 {
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 48px;
    }

    .card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 28px 32px;
      width: 100%;
      max-width: 520px;
      margin-bottom: 20px;
    }

    /* --- Date card --- */
    .date-card .label {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 8px;
    }

    .date-card .date {
      font-size: 2rem;
      font-weight: 600;
      color: #f1f5f9;
    }

    .date-card .day {
      font-size: 1rem;
      color: #7c85a8;
      margin-top: 4px;
    }

    /* --- Quote card --- */
    .quote-card blockquote {
      font-size: 1.05rem;
      line-height: 1.7;
      color: #cbd5e1;
      font-style: italic;
      border-left: 3px solid #6366f1;
      padding-left: 16px;
    }

    .quote-card .author {
      margin-top: 12px;
      font-size: 0.85rem;
      color: #6366f1;
      font-weight: 500;
    }

    .quote-card .refresh-btn {
      margin-top: 16px;
      background: none;
      border: 1px solid #2d3148;
      color: #7c85a8;
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
    }

    .quote-card .refresh-btn:hover {
      border-color: #6366f1;
      color: #6366f1;
    }

    /* --- To-do card --- */
    .todo-card .card-title {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 16px;
    }

    .todo-input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .todo-input-row input {
      flex: 1;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 10px 14px;
      color: #e2e8f0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .todo-input-row input::placeholder {
      color: #3d4466;
    }

    .todo-input-row input:focus {
      border-color: #6366f1;
    }

    .todo-input-row button {
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .todo-input-row button:hover {
      background: #4f52d4;
    }

    .todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .todo-list li {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 10px 14px;
      transition: border-color 0.2s;
    }

    .todo-list li:hover {
      border-color: #3d4466;
    }

    .todo-list li input[type="checkbox"] {
      accent-color: #6366f1;
      width: 16px;
      height: 16px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-list li span {
      flex: 1;
      font-size: 0.95rem;
      color: #cbd5e1;
      transition: color 0.2s;
    }

    .todo-list li.done span {
      text-decoration: line-through;
      color: #3d4466;
    }

    .todo-list li .remove-btn {
      background: none;
      border: none;
      color: #3d4466;
      cursor: pointer;
      font-size: 1rem;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.2s;
    }

    .todo-list li .remove-btn:hover {
      color: #f87171;
    }

    .empty-msg {
      text-align: center;
      color: #3d4466;
      font-size: 0.9rem;
      padding: 12px 0;
    }

    /* --- Weather card --- */
    .weather-card .label {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 16px;
    }

    .weather-main {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .weather-icon {
      font-size: 3rem;
      line-height: 1;
    }

    .weather-temp {
      font-size: 2.4rem;
      font-weight: 600;
      color: #f1f5f9;
    }

    .weather-desc {
      font-size: 0.95rem;
      color: #7c85a8;
      margin-top: 2px;
      text-transform: capitalize;
    }

    .weather-details {
      display: flex;
      gap: 20px;
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid #2d3148;
    }

    .weather-detail {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .weather-detail .detail-label {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #64748b;
    }

    .weather-detail .detail-value {
      font-size: 0.95rem;
      color: #cbd5e1;
      font-weight: 500;
    }

    .weather-loading {
      color: #3d4466;
      font-size: 0.9rem;
    }

    .weather-error {
      color: #f87171;
      font-size: 0.9rem;
    }

    /* --- News card --- */
    .news-card .label {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 16px;
    }

    .news-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .news-item {
      display: block;
      padding: 12px 14px;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 10px;
      text-decoration: none;
      transition: border-color 0.2s;
    }

    .news-item:hover {
      border-color: #6366f1;
    }

    .news-item .news-title {
      font-size: 0.95rem;
      color: #e2e8f0;
      line-height: 1.45;
    }

    .news-item .news-date {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 5px;
    }

    .news-loading {
      color: #3d4466;
      font-size: 0.9rem;
    }

    .news-error {
      color: #f87171;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <h1>Håkon Daily Dashboard</h1>

  <!-- Date -->
  <div class="card date-card">
    <div class="label">Today</div>
    <div class="date" id="date-display"></div>
    <div class="day" id="day-display"></div>
  </div>

  <!-- Weather -->
  <div class="card weather-card">
    <div class="label">Weather · Oslo</div>
    <div id="weather-content"><span class="weather-loading">Loading weather…</span></div>
  </div>

  <!-- News -->
  <div class="card news-card">
    <div class="label">Latest News · VG.no</div>
    <div id="news-content"><span class="news-loading">Loading headlines…</span></div>
  </div>

  <!-- To-do -->
  <div class="card todo-card">
    <div class="card-title">To-Do List</div>
    <div class="todo-input-row">
      <input type="text" id="todo-input" placeholder="Add a new task…" />
      <button onclick="addTodo()">+</button>
    </div>
    <ul class="todo-list" id="todo-list">
      <li class="empty-msg" id="empty-msg">No tasks yet. Add one above!</li>
    </ul>
  </div>

  <!-- Quote -->
  <div class="card quote-card">
    <blockquote id="quote-text"></blockquote>
    <div class="author" id="quote-author"></div>
    <button class="refresh-btn" onclick="showQuote()">New quote</button>
  </div>

  <script>
    // ── Date ──────────────────────────────────────────────
    const now = new Date();
    document.getElementById('date-display').textContent = now.toLocaleDateString('en-US', {
      month: 'long', day: 'numeric', year: 'numeric'
    });
    document.getElementById('day-display').textContent = now.toLocaleDateString('en-US', { weekday: 'long' });

    // ── Quotes ────────────────────────────────────────────
    const quotes = [
      { text: "The secret of getting ahead is getting started.", author: "Mark Twain" },
      { text: "It does not matter how slowly you go as long as you do not stop.", author: "Confucius" },
      { text: "Every expert was once a beginner.", author: "Helen Hayes" },
      { text: "Small steps every day lead to big changes over time.", author: "Unknown" },
      { text: "You don't have to be great to start, but you have to start to be great.", author: "Zig Ziglar" },
      { text: "Learning is not attained by chance; it must be sought with ardor.", author: "Abigail Adams" },
      { text: "Progress, not perfection.", author: "Unknown" },
      { text: "The journey of a thousand miles begins with a single step.", author: "Lao Tzu" },
    ];

    let lastQuoteIndex = -1;

    function showQuote() {
      let index;
      do { index = Math.floor(Math.random() * quotes.length); }
      while (index === lastQuoteIndex);
      lastQuoteIndex = index;
      const q = quotes[index];
      document.getElementById('quote-text').textContent = q.text;
      document.getElementById('quote-author').textContent = '— ' + q.author;
    }

    showQuote();

    // ── To-do ─────────────────────────────────────────────
    function updateEmpty() {
      const list = document.getElementById('todo-list');
      const items = list.querySelectorAll('li:not(#empty-msg)');
      document.getElementById('empty-msg').style.display = items.length === 0 ? 'block' : 'none';
    }

    function addTodo() {
      const input = document.getElementById('todo-input');
      const text = input.value.trim();
      if (!text) return;

      const list = document.getElementById('todo-list');

      const li = document.createElement('li');

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.addEventListener('change', () => {
        li.classList.toggle('done', checkbox.checked);
      });

      const span = document.createElement('span');
      span.textContent = text;

      const removeBtn = document.createElement('button');
      removeBtn.className = 'remove-btn';
      removeBtn.textContent = '✕';
      removeBtn.title = 'Remove task';
      removeBtn.addEventListener('click', () => {
        li.remove();
        updateEmpty();
      });

      li.appendChild(checkbox);
      li.appendChild(span);
      li.appendChild(removeBtn);
      list.appendChild(li);

      input.value = '';
      input.focus();
      updateEmpty();
    }

    // Allow pressing Enter to add a task
    document.getElementById('todo-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    updateEmpty();

    // ── Weather (Oslo) ────────────────────────────────────
    const WMO_CODES = {
      0:  { label: 'Clear sky',           icon: '☀️' },
      1:  { label: 'Mainly clear',        icon: '🌤️' },
      2:  { label: 'Partly cloudy',       icon: '⛅' },
      3:  { label: 'Overcast',            icon: '☁️' },
      45: { label: 'Foggy',               icon: '🌫️' },
      48: { label: 'Icy fog',             icon: '🌫️' },
      51: { label: 'Light drizzle',       icon: '🌦️' },
      53: { label: 'Drizzle',             icon: '🌦️' },
      55: { label: 'Heavy drizzle',       icon: '🌧️' },
      61: { label: 'Light rain',          icon: '🌧️' },
      63: { label: 'Rain',                icon: '🌧️' },
      65: { label: 'Heavy rain',          icon: '🌧️' },
      71: { label: 'Light snow',          icon: '🌨️' },
      73: { label: 'Snow',                icon: '❄️' },
      75: { label: 'Heavy snow',          icon: '❄️' },
      80: { label: 'Rain showers',        icon: '🌦️' },
      81: { label: 'Showers',             icon: '🌧️' },
      82: { label: 'Violent showers',     icon: '⛈️' },
      95: { label: 'Thunderstorm',        icon: '⛈️' },
      99: { label: 'Thunderstorm + hail', icon: '⛈️' },
    };

    async function loadWeather() {
      const url = 'https://api.open-meteo.com/v1/forecast'
        + '?latitude=59.9139&longitude=10.7522'
        + '&current=temperature_2m,apparent_temperature,weathercode,windspeed_10m,relative_humidity_2m'
        + '&wind_speed_unit=ms&timezone=Europe%2FOslo';
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error('Network error');
        const data = await res.json();
        const c = data.current;
        const code = c.weathercode;
        const condition = WMO_CODES[code] ?? { label: 'Unknown', icon: '🌡️' };

        document.getElementById('weather-content').innerHTML = `
          <div class="weather-main">
            <div class="weather-icon">${condition.icon}</div>
            <div>
              <div class="weather-temp">${Math.round(c.temperature_2m)}°C</div>
              <div class="weather-desc">${condition.label}</div>
            </div>
          </div>
          <div class="weather-details">
            <div class="weather-detail">
              <span class="detail-label">Feels like</span>
              <span class="detail-value">${Math.round(c.apparent_temperature)}°C</span>
            </div>
            <div class="weather-detail">
              <span class="detail-label">Humidity</span>
              <span class="detail-value">${c.relative_humidity_2m}%</span>
            </div>
            <div class="weather-detail">
              <span class="detail-label">Wind</span>
              <span class="detail-value">${Math.round(c.windspeed_10m)} m/s</span>
            </div>
          </div>`;
      } catch {
        document.getElementById('weather-content').innerHTML =
          '<span class="weather-error">Could not load weather. Check your connection.</span>';
      }
    }

    loadWeather();

    // ── News (VG.no) ──────────────────────────────────────
    async function loadNews() {
      const rssUrl = 'https://www.vg.no/rss/feed/';
      const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(rssUrl);
      try {
        const res = await fetch(proxyUrl);
        if (!res.ok) throw new Error('Network error');
        const json = await res.json();
        const xml = new DOMParser().parseFromString(json.contents, 'text/xml');
        const items = Array.from(xml.querySelectorAll('item')).slice(0, 3);
        if (!items.length) throw new Error('No items');

        const html = items.map(item => {
          const title = item.querySelector('title')?.textContent ?? 'No title';
          const link  = item.querySelector('link')?.textContent ?? '#';
          const pub   = item.querySelector('pubDate')?.textContent ?? '';
          const date  = pub ? new Date(pub).toLocaleString('en-GB', {
            day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
          }) : '';
          return `<a class="news-item" href="${link}" target="_blank" rel="noopener">
            <div class="news-title">${title}</div>
            ${date ? `<div class="news-date">${date}</div>` : ''}
          </a>`;
        }).join('');

        document.getElementById('news-content').innerHTML = `<div class="news-list">${html}</div>`;
      } catch {
        document.getElementById('news-content').innerHTML =
          '<span class="news-error">Could not load headlines. Check your connection.</span>';
      }
    }

    loadNews();
  </script>
</body>
</html>
